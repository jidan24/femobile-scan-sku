name: barcode_spreadsheet
description: "Scan barcode dan kirim ke Google Sheets secara otomatis"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Barcode Scanner
  mobile_scanner: ^5.2.3

  # Storage & Utilities
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  http: ^1.2.1

  # UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
